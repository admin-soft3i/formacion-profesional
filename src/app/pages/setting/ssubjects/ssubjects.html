<section class="text-muted p-3 rounded mt-3">
	<h2 class="mb-4 border-bottom border-light pb-1">Configuración de las Asignaturas.</h2>
    <div class="container">
        <div class="row">
			<div class="col-lg-12 d-flex border-bottom border-1 border-light">
				<h4>Listado de asignaturas</h4>
				<div class="ms-auto">
					<a class="btn btn-success btn-sm">
						<i class="bi bi-file-plus me-1 fs-6"></i>
						Crear asignatura
					</a>
				</div>
			</div>			
            <div class="col-lg-12">
				<table class="table table-striped">
					<thead>
						<tr>
							<th scope="col">ID</th>
							<th scope="col" class="col-7">Nombre</th>
							<th scope="col" class="col-3">Curso</th>
							<th scope="col" class="col-1">Activo</th>
							<th scope="col" class="col-1 text-center">Acción</th>
						</tr>
					</thead>
					<tbody>
						@for (subject of listSubjects(); track subject.id) {
							<tr>
								<th scope="row">{{ subject.id }}.</th>
								<td>{{ subject.name }}</td>
								<td>{{ getCourseName(subject.course_id) }}</td>
								<td>
									<div class="form-check form-switch">
										<input class="form-check-input" type="checkbox" role="switch" id="switchCheckChecked" checked>
										<label class="form-check-label" for="switchCheckChecked"></label>
									</div>
								</td>
								<td class="text-center">
									<button class="btn btn-secondary p-1 me-1"><i class="bi bi-pencil-square"></i></button>
									<button class="btn btn-danger p-1"><i class="bi bi-trash"></i></button>
								</td>
							</tr>
						}
					</tbody>					
				</table>
            </div>
        </div>
    </div>
</section>
