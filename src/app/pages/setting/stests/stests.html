<h2  class="mb-4 border-bottom border-light pb-1">Configuración de los Cuestionarios de Preguntas</h2>
<section class="text-muted p-3">
    <div class="container">
        <div class="row">
			<div class="col-lg-12 d-flex border-bottom border-1 border-light">
				<h4>Listado de cuestionarios</h4>
				<div class="ms-auto">
					<a class="btn btn-success btn-sm">
						<i class="bi bi-file-plus me-1 fs-6"></i>
						Crear cuestionario
					</a>
				</div>
			</div>			
            <div class="col-lg-12">
				<table class="table table-striped">
					<thead>
						<tr>
							<th scope="col">Código</th>
							<th scope="col" class="col-4">Tema</th>
							<th scope="col" class="col-4">Asignatura</th>
							<th scope="col" class="col-2">Curso</th>
							<th scope="col" class="col-1">Activo</th>
							<th scope="col" class="col-1 text-center">Acción</th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<th scope="row">C001.</th>
							<td>Organización general del organismo</td>
							<td>Anatomofisiología y Patología Básica</td>
							<td>Curso 1º</td>
							<td>
								<div class="form-check form-switch">
									<input class="form-check-input" type="checkbox" role="switch" id="switchCheckChecked" checked>
									<label class="form-check-label" for="switchCheckChecked"></label>
								</div>								
							</td>
							<td class="text-center">
								<button class="btn btn-secondary p-1 me-1"><i class="bi bi-pencil-square"></i></button>
								<button class="btn btn-danger p-1"><i class="bi bi-trash"></i></button>
							</td>							
						</tr>
					</tbody>					
				</table>
            </div>
        </div>
    </div>
</section>
