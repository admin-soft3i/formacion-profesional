<section class="text-muted p-3 pt-5 rounded-5 bg-white bg-opacity-50">
    <div class="container-fluid">
        <div class="row">
			<div class="col-lg-12">
				<div class="row">
					<div class="col-lg-12">
						<h4 class="border-bottom border-light pb-1">
							Curso: 
							@if (listSubjects().length > 0) {
								<span>{{ getCourseName(listSubjects()[0].course_id) }}.</span>
							} @else {
								<span>Sin temas asociados.</span>
							}
						</h4>
					</div>
					<div class="col-lg-12 mb-3">
						<h2 class="border-bottom border-light pb-1">Asignaturas.</h2>
					</div>
					<div class="col-lg-12">
						<div class="row d-flex justify-content-start">
							@for (subject of rsubjects(); track subject.id) {
								<div class="col-3 d-flex justify-content-center mb-3">
									<a [routerLink]="['/issues', subject.id]" class="vibrar-hover">
										<div class="issue shadow rounded-5 bg-white px-4 pt-3 pb-2 alto">
											<div class="card-body d-flex align-items-start flex-column">
												<div class="mb-auto">
													<h5 class="card-title fw-bold h4 text-muted mb-2">A{{ subject.id }}.</h5>
													<h6 class="card-text mb-2 text-success fw-bold h4">{{ subject.name }}</h6>
												</div>
												<div class="p-2">
													<span class="py-1"><i class="bi bi-arrow-right fw-bold"></i></span>
												</div>
											</div>
										</div>
									</a>
								</div>
							} @empty{
								<p>No existen asignaturas configuradas en el curso.</p>
							}
						</div>
					</div>
				</div>
			</div>
        </div>
    </div>
</section>
