<section class="text-muted p-3 pt-5 rounded-5 bg-white bg-opacity-50">
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12 mb-5">
				<div class="row">
					<div class="col-12 align-items-center justify-content-center text-center mb-5">
						<h1 class="fw-bold text-muted">ANATOMOFISIOLOGÍA Y PATOLOGÍA BÁSICA</h1>
						<span>Tests tipo examen para practicar todas las asignaturas del grado medio.</span>
					</div>
					<div class="col-12">
						<div class="row mb-3 d-flex justify-content-center">
							@for (course of listCourses(); track course.id) {
								<div class="col-3 d-flex justify-content-center">
									<a [routerLink]="['/subjects', course.id]" class="vibrar-hover">
										<div class="d-flex align-items-center">
											<div class="issue shadow rounded-5 bg-light px-4 pt-3 pb-2">
												<div class="card-body text-center">
													<h5 class="card-title fw-bold h3 text-muted mb-2">{{ course.degree }}</h5>
													<h6 class="card-text mb-2 fw-bold">{{ course.name }}</h6>
													<p class="card-text mb-2">{{ course.note }}</p>
													<span class="py-1">
														<i class="bi bi-arrow-right fw-bold"></i>
													</span>
												</div>
											</div>
										</div>
									</a>
								</div>
							} @empty{
								<p>No existen cursos configurados.</p>
							}
						</div>
					</div>
				</div>
            </div>
			<div class="col-lg-12">
				<figure class="bg-success bg-opacity-50 p-4 rounded shadow lead text-dark">
					<blockquote class="blockquote mb-4">
						<p class="h4">Información importante.</p>
					</blockquote>
					<figcaption class="blockquote-footer text-dark">
						Estos test están pensados como herramienta de práctica y aprendizaje.
					</figcaption>
					<figcaption class="blockquote-footer text-dark">
						Las preguntas reales del examen pueden ser diferentes y no tienen por qué aparecer exactamente igual que aquí.
					</figcaption>
					<figcaption class="blockquote-footer text-dark">
						La finalidad no es memorizar respuestas, sino practicar de forma continua para reforzar los contenidos y comprender mejor los temas más importantes.
					</figcaption>
					<figcaption class="blockquote-footer text-dark">
						Cuantos más test se hagan y más dominados estén los conceptos, mayores serán las posibilidades de afrontar el examen con seguridad.
					</figcaption>					
				</figure>
			</div>
        </div>
    </div>
</section>
